version: 2

project_name: porch

before:
  hooks:
    - go mod download
    - go test ./...

builds:
  - id: porch
    main: ./cmd/porch
    binary: porch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
